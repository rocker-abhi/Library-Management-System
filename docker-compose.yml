version: '3.8'

services:
  redis:
    build:
      context: ./Redis-Server
      dockerfile: Dockerfile
    container_name: hrms-redis
    ports:
      - "6379:6379"
    volumes:
      - hrms_redis_data:/data
    restart: always

  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: hrms-auth-service
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=admin@123
      - DATABASE_URL=postgresql+psycopg2://abhishek:admin%40123@host.docker.internal:5432/hrms_db
      - SECRET_KEY=my-secret-key
      - DEBUG=True
      - MINIMUM_LOGGIN_LEVEL=DEBUG
      - JWT_SECREAT_KEY=hashMyPassword
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_TIME=300
      - JWT_REFRESH_TOKEN_EXPIRE_TIME=604800
    restart: always

  book-service:
    build:
      context: ./BookService
      dockerfile: Dockerfile
    container_name: hrms-book-service
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql+psycopg2://abhishek:admin%40123@host.docker.internal:5432/hrms_db
      - SECRET_KEY=my-secret-key
      - DEBUG=True
      - MINIMUM_LOGGIN_LEVEL=DEBUG
      - JWT_SECREAT_KEY=hashMyPassword
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_TIME=300
      - JWT_REFRESH_TOKEN_EXPIRE_TIME=604800
    restart: always

  nginx-server:
    build:
      context: ./Nginx-Server
      dockerfile: Dockerfile
    container_name: hrms-nginx-server
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - frontend
    restart: always

  frontend:
    build:
      context: ./library-management-system-frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://auth-service:8000
    depends_on:
      - auth-service
    restart: always

volumes:
  hrms_redis_data:
    driver: local
